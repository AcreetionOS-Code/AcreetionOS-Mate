name: Build AcreetionOS MATE ISO

on:
  # Manual trigger via workflow_dispatch
  workflow_dispatch:
    inputs:
      build_reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    strategy:
      matrix:
        arch: [x86_64]
        exclude:
          # Placeholder for future multi-arch support
          - arch: ''
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Set up build environment
        run: |
          # Update system packages
          sudo apt-get update
          sudo apt-get install -y \
            arch-install-scripts \
            dosfstools \
            grub-efi-amd64-signed \
            grub-pc-bin \
            mtools \
            parted \
            libarchive-tools \
            bc \
            p7zip-full
          
          # Install Arch Linux bootstrap
          sudo pacman-key --init
          sudo pacman-key --populate archlinux
      
      - name: Generate build version and metadata
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x ./generate-build-version.sh
          ./generate-build-version.sh info
          
          # Export version variables for subsequent steps
          source <(./generate-build-version.sh | grep "export" | sed 's/export //')
          echo "BUILD_VERSION=${BUILD_VERSION}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "BUILD_SEMVER=${BUILD_SEMVER}" >> $GITHUB_ENV
          echo "BUILD_GIT_TAG=${BUILD_GIT_TAG}" >> $GITHUB_ENV
          echo "BUILD_HASH=${BUILD_HASH}" >> $GITHUB_ENV
          echo "ISO_NAME=${ISO_NAME}" >> $GITHUB_ENV
      
      - name: Security gate - Package validation
        run: |
          echo "🔒 Running security validation..."
          chmod +x ./validate-build.sh
          ./validate-build.sh
          
          # Check for known vulnerabilities in packages
          if grep -q "cinnamon\|nemo\|muffin\|gnome-terminal" packages.x86_64; then
            echo "❌ SECURITY: Found conflicting packages (Cinnamon/GNOME)"
            exit 1
          fi
          echo "✅ Security validation passed"
      
      - name: Generate build metadata
        run: |
          mkdir -p airootfs/etc
          cat > airootfs/etc/acreetion-build-info <<EOF
          BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          BUILD_COMMIT=$(git rev-parse HEAD)
          BUILD_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BUILD_VERSION=${{ steps.version.outputs.version }}
          BUILD_SYSTEM=GitHub Actions
          BUILD_RUNNER=${{ runner.os }}
          EOF
      
      - name: Build ISO
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x ./build-mate.sh
          sudo -E ./build-mate.sh ${{ matrix.arch }}
      
      - name: Generate checksums
        run: |
          cd ../ISO
          sha256sum AcreetionOS-MATE-*-${{ matrix.arch }}.iso > AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
          cat AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts (scheduled/manual builds)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: acreetionos-mate-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
          retention-days: 30
      
      - name: Clean up build artifacts
        if: always()
        run: |
          echo "Cleanup step for build environment"
          # Note: GitHub Actions will clean up the runner automatically
